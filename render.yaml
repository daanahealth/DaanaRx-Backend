services:
  - type: web
    name: daanahealth-gateway
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: false
    buildCommand: cd gateway && npm install && npm run build
    startCommand: cd gateway && npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AUTH_SERVICE_URL
        value: https://daanahealth-auth.onrender.com
      - key: INVENTORY_SERVICE_URL
        value: https://daanahealth-inventory.onrender.com
      - key: TRANSACTION_SERVICE_URL
        value: https://daanahealth-transaction.onrender.com
      - key: NOTIFICATION_SERVICE_URL
        value: https://daanahealth-notification.onrender.com
      - key: BUGS_SERVICE_URL
        value: https://daanahealth-bugs.onrender.com

  - type: web
