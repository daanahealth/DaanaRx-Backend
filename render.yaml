services:
  # Consolidated monolith: a single Express app mounting the auth/inventory/
  # transaction/notification routers directly (no proxying), under the same
  # public prefixes. One service = one cold start (vs the old 5), and a single
  # service fits the free keep-warm budget. The frontend's NEXT_PUBLIC_API_URL
  # is unchanged (still this gateway URL). The standalone bugs-dashboard is NOT
  # consolidated (it's accessed directly), so /bugs is no longer on the gateway.
  - type: web
    name: daanahealth-gateway
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: false
    buildCommand: npm install && npm run build:consolidated
    startCommand: npm run start:consolidated
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: daanahealth-auth
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: false
    buildCommand: cd services/auth && npm install && npm run build
    startCommand: cd services/auth && npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
