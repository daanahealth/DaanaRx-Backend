services:
  - type: web
    name: daanarx-api-gateway
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: cd gateway && npm install && npm run build
    startCommand: cd gateway && npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: AUTH_SERVICE_URL
        value: https://daanarx-auth-service.onrender.com
      - key: INVENTORY_SERVICE_URL
        value: https://daanarx-inventory-service.onrender.com
      - key: TRANSACTION_SERVICE_URL
        value: https://daanarx-transaction-service.onrender.com
      - key: NOTIFICATION_SERVICE_URL
        value: https://daanarx-notification-service.onrender.com

  - type: web
    name: daanarx-auth-service
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: cd services/auth && npm install && npm run build
    startCommand: cd services/auth && npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

