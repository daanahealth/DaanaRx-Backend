<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0fb5b3" />
    <title>DaanaRX — Bug Reports</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230fb5b3'/%3E%3Cpath d='M16 8a4 4 0 014 4v1h2a1 1 0 110 2h-2v1.5a4 4 0 11-8 0V15h-2a1 1 0 110-2h2v-1a4 4 0 014-4z' fill='white'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
            },
            colors: {
              brand: {
                50: '#eefbfb', 100: '#d4f5f5', 200: '#aeebeb', 300: '#7ddcdc',
                400: '#3fc7c7', 500: '#0fb5b3', 600: '#0a9595', 700: '#0e7575',
                800: '#125c5c', 900: '#0f4a4a',
              },
              ink: {
                50: '#f7f9fb', 100: '#eef2f6', 200: '#dbe4ed', 300: '#bccddd',
                400: '#94aac4', 500: '#6f88a8', 600: '#536e8c', 700: '#43586f',
                800: '#384a5e', 900: '#1f2937', 950: '#0e1620',
              },
            },
            keyframes: {
              pulseDot: { '0%,100%': { transform: 'scale(1)', opacity: '1' }, '50%': { transform: 'scale(1.4)', opacity: '0.5' } },
            },
            animation: { pulseDot: 'pulseDot 1.6s ease-in-out infinite' },
          },
        },
      };
    </script>
    <style>
      html { font-feature-settings: 'cv02','cv03','cv04','cv11'; -webkit-font-smoothing: antialiased; }
      body {
        background:
          radial-gradient(1200px 600px at 80% -10%, rgba(15,181,179,0.10), transparent 60%),
          radial-gradient(900px 500px at 0% 0%, rgba(15,181,179,0.05), transparent 60%),
          linear-gradient(180deg, #ffffff 0%, #f7f9fb 100%);
        min-height: 100vh;
      }
      .glass {
        background: rgba(255,255,255,0.72);
        backdrop-filter: saturate(160%) blur(12px);
        -webkit-backdrop-filter: saturate(160%) blur(12px);
        border: 1px solid rgba(219,228,237,0.6);
      }
      .card-hover { transition: transform .22s cubic-bezier(.2,.8,.2,1), box-shadow .22s ease; }
      .card-hover:hover { transform: translateY(-1px); box-shadow: 0 12px 30px -10px rgba(15,90,90,.15); }
      [x-cloak] { display: none !important; }
    </style>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  </head>
  <body class="font-sans text-ink-900">
    <div x-data="bugs()" x-init="boot()" x-cloak class="min-h-screen">
      <header class="sticky top-0 z-20 glass">
        <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="h-9 w-9 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-sm">
              <svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 17l-3-3m0 0l3-3m-3 3h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v6"/>
              </svg>
            </div>
            <div>
              <div class="text-sm font-semibold tracking-tight">DaanaRX</div>
              <div class="text-xs text-ink-500 -mt-0.5">User-reported bugs &amp; feature requests</div>
            </div>
          </div>
          <div class="flex items-center gap-3 text-xs text-ink-500">
            <span class="hidden sm:inline-flex items-center gap-2">
              <span class="relative flex h-2 w-2">
                <span class="animate-pulseDot absolute inline-flex h-full w-full rounded-full bg-brand-400"></span>
                <span class="relative inline-flex h-2 w-2 rounded-full bg-brand-500"></span>
              </span>
              Live · refreshes every 10s
            </span>
            <span class="font-mono text-ink-400" x-text="clock"></span>
          </div>
        </div>
      </header>

      <main class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 py-6 sm:py-8 space-y-6">
        <!-- Summary -->
        <section class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4">
          <div class="rounded-2xl glass card-hover p-4 sm:p-5">
            <div class="text-xs font-medium uppercase tracking-wide text-ink-500">Total reports</div>
            <div class="mt-2 text-3xl font-semibold" x-text="data?.summary?.total ?? 0"></div>
          </div>
          <div class="rounded-2xl glass card-hover p-4 sm:p-5">
            <div class="text-xs font-medium uppercase tracking-wide text-ink-500">Bugs</div>
            <div class="mt-2 text-3xl font-semibold text-red-700" x-text="data?.summary?.counts?.Bug ?? 0"></div>
          </div>
          <div class="rounded-2xl glass card-hover p-4 sm:p-5">
            <div class="text-xs font-medium uppercase tracking-wide text-ink-500">Feature requests</div>
            <div class="mt-2 text-3xl font-semibold text-brand-700" x-text="data?.summary?.counts?.['Feature Request'] ?? 0"></div>
          </div>
          <div class="rounded-2xl glass card-hover p-4 sm:p-5">
            <div class="text-xs font-medium uppercase tracking-wide text-ink-500">Other</div>
            <div class="mt-2 text-3xl font-semibold text-ink-700" x-text="data?.summary?.counts?.Other ?? 0"></div>
          </div>
        </section>

        <!-- Filter chips -->
        <section class="flex flex-wrap items-center gap-2">
          <button
            @click="filter = 'all'"
            class="px-3 py-1.5 rounded-full text-xs font-semibold transition-colors"
            :class="filter === 'all' ? 'bg-ink-900 text-white' : 'bg-ink-100 text-ink-700 hover:bg-ink-200'"
          >
            All <span class="font-mono ml-1 text-[10px] opacity-70" x-text="(data?.items ?? []).length"></span>
          </button>
          <button
            @click="filter = 'Bug'"
            class="px-3 py-1.5 rounded-full text-xs font-semibold transition-colors"
            :class="filter === 'Bug' ? 'bg-red-100 text-red-800 ring-1 ring-red-200' : 'bg-ink-100 text-ink-700 hover:bg-ink-200'"
          >
            Bugs <span class="font-mono ml-1 text-[10px] opacity-70" x-text="(data?.items ?? []).filter(i => i.type === 'Bug').length"></span>
          </button>
          <button
            @click="filter = 'Feature Request'"
            class="px-3 py-1.5 rounded-full text-xs font-semibold transition-colors"
            :class="filter === 'Feature Request' ? 'bg-brand-100 text-brand-800 ring-1 ring-brand-200' : 'bg-ink-100 text-ink-700 hover:bg-ink-200'"
          >
            Feature requests <span class="font-mono ml-1 text-[10px] opacity-70" x-text="(data?.items ?? []).filter(i => i.type !== 'Bug').length"></span>
          </button>
          <div class="grow"></div>
          <input
            type="search"
            placeholder="Search title or body…"
            x-model="search"
            class="px-3 py-1.5 rounded-lg text-sm bg-white border border-ink-200 focus:outline-none focus:ring-2 focus:ring-brand-300 w-full sm:w-64"
          />
        </section>

        <!-- Items list -->
        <section class="space-y-3">
          <template x-if="filtered.length === 0">
            <div class="rounded-2xl glass p-8 text-center">
              <div class="text-3xl mb-2">🪲</div>
              <div class="text-sm font-medium text-ink-700">No reports match these filters.</div>
              <div class="text-xs text-ink-500 mt-1">When users tap the floating chat icon in the app, reports land here within 10s.</div>
            </div>
          </template>
          <template x-for="item in filtered" :key="item.id">
            <div class="rounded-2xl glass card-hover p-4 sm:p-5">
              <div class="flex items-start gap-3">
                <span
                  class="text-[10px] font-bold uppercase px-2 py-0.5 rounded shrink-0"
                  :class="item.type === 'Bug' ? 'bg-red-100 text-red-800' : 'bg-brand-100 text-brand-800'"
                  x-text="item.type"
                ></span>
                <div class="min-w-0 flex-1">
                  <div class="flex items-baseline justify-between gap-2">
                    <h3 class="text-base font-semibold text-ink-900 truncate" x-text="item.title || '(no title)'"></h3>
                    <span class="text-[11px] text-ink-400 font-mono shrink-0" x-text="relativeTime(item.created_at)"></span>
                  </div>
                  <p class="mt-1.5 text-sm text-ink-700 whitespace-pre-wrap break-words" x-text="item.body"></p>
                  <div class="mt-3 flex items-center gap-3 text-[11px] text-ink-500 font-mono">
                    <span x-show="item.user_id">user: <span class="text-ink-700" x-text="item.user_id?.slice(0,8)"></span></span>
                    <span x-show="item.clinic_id">clinic: <span class="text-ink-700" x-text="item.clinic_id?.slice(0,8)"></span></span>
                    <span class="text-ink-300" x-text="new Date(item.created_at).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' })"></span>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </section>

        <footer class="text-center text-xs text-ink-400 pt-2 pb-6">
          DaanaRX · Bug Reports · refresh every 10s
        </footer>
      </main>
    </div>

    <script>
      function bugs() {
        return {
          data: null,
          filter: 'all',
          search: '',
          clock: '',
          get filtered() {
            const items = this.data?.items ?? [];
            const q = this.search.trim().toLowerCase();
            return items.filter((i) => {
              if (this.filter === 'Bug' && i.type !== 'Bug') return false;
              if (this.filter === 'Feature Request' && i.type === 'Bug') return false;
              if (q && !((i.title || '').toLowerCase().includes(q) || (i.body || '').toLowerCase().includes(q))) return false;
              return true;
            });
          },
          async fetchData() {
            try {
              const r = await fetch('/api/feedback', { cache: 'no-store' });
              this.data = await r.json();
            } catch {
              // keep prior data on failure
            }
          },
          tickClock() {
            const d = new Date();
            this.clock = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          },
          relativeTime(iso) {
            if (!iso) return '—';
            const d = new Date(iso);
            const s = Math.max(0, Math.floor((Date.now() - d.getTime()) / 1000));
            if (s < 5) return 'just now';
            if (s < 60) return s + 's ago';
            const m = Math.floor(s / 60);
            if (m < 60) return m + 'm ago';
            const h = Math.floor(m / 60);
            if (h < 24) return h + 'h ago';
            return Math.floor(h / 24) + 'd ago';
          },
          boot() {
            this.tickClock();
            this.fetchData();
            setInterval(() => this.tickClock(), 1000);
            setInterval(() => this.fetchData(), 10000);
          },
        };
      }
    </script>
  </body>
</html>
