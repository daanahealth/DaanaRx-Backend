name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install (incl. devDependencies)
        run: npm install --include=dev
      - name: Typecheck + build consolidated monolith
        run: npm run build:consolidated
      - name: Engine unit tests (inventory-core)
        run: npm run test:engine
